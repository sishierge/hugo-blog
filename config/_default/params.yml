mainSections: ["post"]
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: 四十二阁
email: Sishierge42@gmail.com
description: "思考、记录、分享"

subtitle:
  typing:
    enable: true
    strings:
      - 思考、记录、分享
      - 个人博客，分享技术、学习和思考
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: false
    showCursor: true
    cursorChar: "|"
    smartBackspace: false
  text: "思考、记录、分享"

banner: "images/banner.webp"
# 主题固定前缀 /avatar/ + 本字段 → /avatar/images/avatar.webp，对应 static/avatar/images/avatar.webp
avatar: "images/avatar.webp"

cover:
toc: true

open_graph:
  enable: true
  options:

excerpt_link: 阅读更多

copyright:

footer:
  since: 2025
  powered: true
  count: true
  busuanzi: true
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

sidebar:
  position: right
  menu: true
  article:
    show_common: true

social:
  email: mailto:Sishierge42@gmail.com
  github: https://github.com/pronut

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

only_show_capsule_in_index: false
uppercase_capsule: true
show_update_time: false

summary:
  enable: false
  style: 'subtitle'

rss:
  limit: 10
  showFullContent: false
  showCopyright: false

sort_order:
  taxonomy:
    category: date-reverse
    tag: date-reverse
  archive: date-reverse
  home: default

layout:
  max_width: 1350px

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_a0oqhord1y

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:

local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  enable: auto

preloader:
  enable: true
  text:
    zh-CN: 少女祈祷中...
    en: Loading...
  rotate: true

animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

firework:
  enable: true
  disable_on_mobile: false
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["#555555", "#777777", "#999999", "#bbbbbb"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["#222222"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

top:
  enable: true
  position: right
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

math:
  katex:
    enable: true
  mathjax:
    enable: false

clipboard:
  success:
    zh-CN: 复制成功 (*^▽^*)
    en: Copy successfully (*^▽^*)
  fail:
    zh-CN: 复制失败
    en: Copy failed
  copyright:
    enable: false

# 评论：https://giscus.app/zh-CN（基于 GitHub Discussions，需公开仓库 + 安装 Giscus App）
comment:
  title:
    zh-CN: 说些什么吧！
    en: Leave a comment
  default: giscus

# Giscus：需安装 https://github.com/apps/giscus 并授权本仓库
giscus:
  enable: true
  repo: sishierge/hugo-blog
  repoId: R_kgDOR_jvnQ
  category: Comments
  categoryId: DIC_kwDOR_jvnc4C6pZO
  mapping: pathname
  strict: "0"
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  theme:
    light: ""
    dark: ""

# 以下为显式关闭（与主题默认一致，避免误合并出多套评论）
valine:
  enable: false
waline:
  enable: false
twikoo:
  enable: false
gitalk:
  enable: false
utterances:
  enable: false
beaudar:
  enable: false
disqus:
  enable: false

pace:
  enable: true

# 主题色板（变量名沿用主题的 --red-*，此处改为黑白灰）
internal_theme:
  light:
    "--red-0": "#000000"
    "--red-1": "#1a1a1a"
    "--red-2": "#404040"
    "--red-3": "#6b6b6b"
    "--red-4": "#c4c4c4"
    "--red-5": "#e8e8e8"
    "--red-5-5": "#f0f0f0"
    "--red-6": "#f7f7f7"
    "--color-red-6-shadow": "rgba(0, 0, 0, 0.12)"
    "--color-red-3-shadow": "rgba(0, 0, 0, 0.22)"
  dark:
    "--red-4": "rgba(255, 255, 255, 0.35)"
    "--red-5": "rgba(255, 255, 255, 0.12)"
    "--red-5-5": "rgba(255, 255, 255, 0.06)"
    "--red-6": "rgba(255, 255, 255, 0.14)"

# 深色模式下主题未暴露 --red-1～3 参数，补一层保证链接/强调色为浅灰
injector:
  head_end: |
    <style>
    html[data-theme="dark"] {
      --red-1: #d0d0d0;
      --red-2: #b0b0b0;
      --red-3: #909090;
    }
    </style>
