# 本文件在「仅 hugo-blog 作为 Git 仓库根目录」时使用（与外层 博客 仓库里的 workflow 二选一）
name: Deploy Hugo to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: hugo-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - name: Build
        env:
          HUGO_BASEURL: ${{ secrets.HUGO_BASE_URL }}
        run: |
          set -e
          BASE_URL="${HUGO_BASEURL:-https://sishierge.de5.net/}"
          echo "Using baseURL: ${BASE_URL}"
          hugo --gc --minify --baseURL "${BASE_URL}"

      - name: Publish to Cloudflare Pages
        if: ${{ vars.CLOUDFLARE_ENABLED == 'true' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: hugo-blog
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip notice (Cloudflare disabled)
        if: ${{ vars.CLOUDFLARE_ENABLED != 'true' }}
        run: |
          echo "Cloudflare deploy skipped: set repository variable CLOUDFLARE_ENABLED=true to enable."
